services:
  app:
    build: .
    container_name: ecommerce_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:8
    container_name: ecommerce_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
  media_data:
